<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Notas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .form-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .note-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        .note-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .note-text {
            color: #666;
            line-height: 1.5;
            margin-bottom: 15px;
            word-break: break-word;
        }

        .note-date {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 15px;
        }

        .note-actions {
            display: flex;
            gap: 10px;
        }

        .btn-edit {
            background: #4CAF50;
            color: white;
            flex: 1;
        }

        .btn-edit:hover {
            background: #45a049;
        }

        .btn-delete {
            background: #f44336;
            color: white;
            flex: 1;
        }

        .btn-delete:hover {
            background: #da190b;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: white;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.1em;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border: 1px solid #f5c6cb;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            border: 1px solid #c3e6cb;
        }

        .form-title {
            color: #333;
            font-size: 1.3em;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .notes-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [notes, setNotes] = useState([]);
            const [titulo, setTitulo] = useState('');
            const [texto, setTexto] = useState('');
            const [editingId, setEditingId] = useState(null);
            const [loading, setLoading] = useState(true);
            const [message, setMessage] = useState('');
            const API_URL = 'http://localhost:3000/api/notes';

            // Carregar notas ao iniciar
            useEffect(() => {
                fetchNotes();
            }, []);

            // Função para buscar notas
            const fetchNotes = async () => {
                try {
                    setLoading(true);
                    const response = await fetch(API_URL);
                    if (!response.ok) throw new Error('Erro ao carregar notas');
                    const data = await response.json();
                    setNotes(data);
                    setMessage('');
                } catch (error) {
                    showMessage(`Erro: ${error.message}`, 'error');
                } finally {
                    setLoading(false);
                }
            };

            // Função para mostrar mensagens
            const showMessage = (msg, type = 'success') => {
                setMessage({ text: msg, type });
                setTimeout(() => setMessage(''), 3000);
            };

            // Função para criar/atualizar nota
            const handleSubmit = async (e) => {
                e.preventDefault();

                if (!titulo.trim() || !texto.trim()) {
                    showMessage('Preenchimento de título e texto obrigatório!', 'error');
                    return;
                }

                try {
                    const payload = { titulo: titulo.trim(), texto: texto.trim() };

                    if (editingId) {
                        // Atualizar nota
                        const response = await fetch(`${API_URL}/${editingId}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) throw new Error('Erro ao atualizar nota');
                        showMessage('Nota atualizada com sucesso!', 'success');
                        setEditingId(null);
                    } else {
                        // Criar nova nota
                        const response = await fetch(API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) throw new Error('Erro ao criar nota');
                        showMessage('Nota criada com sucesso!', 'success');
                    }

                    setTitulo('');
                    setTexto('');
                    fetchNotes();
                } catch (error) {
                    showMessage(error.message, 'error');
                }
            };

            // Função para editar nota
            const handleEdit = (note) => {
                setTitulo(note.titulo);
                setTexto(note.texto);
                setEditingId(note.id);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            // Função para excluir nota
            const handleDelete = async (id) => {
                if (!confirm('Tem certeza que deseja excluir esta nota?')) return;

                try {
                    const response = await fetch(`${API_URL}/${id}`, {
                        method: 'DELETE'
                    });

                    if (!response.ok) throw new Error('Erro ao excluir nota');
                    showMessage('Nota excluída com sucesso!', 'success');
                    fetchNotes();
                } catch (error) {
                    showMessage(error.message, 'error');
                }
            };

            // Função para cancelar edição
            const handleCancel = () => {
                setTitulo('');
                setTexto('');
                setEditingId(null);
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>📝 Gerenciador de Notas</h1>
                        <p>Organize suas ideias e lembretes</p>
                    </div>

                    {/* Mensagem de sucesso/erro */}
                    {message && (
                        <div className={message.type === 'error' ? 'error' : 'success'}>
                            {message.text}
                        </div>
                    )}

                    {/* Formulário */}
                    <div className="form-section">
                        <h2 className="form-title">
                            {editingId ? '✏️ Editando Nota' : '➕ Nova Nota'}
                        </h2>
                        <form onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label htmlFor="titulo">Título</label>
                                <input
                                    id="titulo"
                                    type="text"
                                    value={titulo}
                                    onChange={(e) => setTitulo(e.target.value)}
                                    placeholder="Digite o título da nota..."
                                />
                            </div>

                            <div className="form-group">
                                <label htmlFor="texto">Texto</label>
                                <textarea
                                    id="texto"
                                    value={texto}
                                    onChange={(e) => setTexto(e.target.value)}
                                    placeholder="Digite o conteúdo da nota..."
                                />
                            </div>

                            <div className="button-group">
                                <button type="submit" className="btn-primary">
                                    {editingId ? '💾 Atualizar' : '✅ Criar Nota'}
                                </button>
                                {editingId && (
                                    <button
                                        type="button"
                                        className="btn-secondary"
                                        onClick={handleCancel}
                                    >
                                        ❌ Cancelar
                                    </button>
                                )}
                            </div>
                        </form>
                    </div>

                    {/* Lista de notas */}
                    {loading ? (
                        <div className="loading">⏳ Carregando notas...</div>
                    ) : notes.length === 0 ? (
                        <div className="empty-state">
                            <div className="empty-state-icon">📭</div>
                            <h2>Nenhuma nota criada</h2>
                            <p>Comece criando sua primeira nota acima!</p>
                        </div>
                    ) : (
                        <div className="notes-grid">
                            {notes.map((note) => (
                                <div key={note.id} className="note-card">
                                    <div className="note-title">{note.titulo}</div>
                                    <div className="note-text">{note.texto}</div>
                                    <div className="note-date">
                                        📅 {new Date(note.criadoEm).toLocaleDateString('pt-BR')}
                                    </div>
                                    <div className="note-actions">
                                        <button
                                            className="btn-edit"
                                            onClick={() => handleEdit(note)}
                                        >
                                            ✏️ Editar
                                        </button>
                                        <button
                                            className="btn-delete"
                                            onClick={() => handleDelete(note.id)}
                                        >
                                            🗑️ Excluir
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
